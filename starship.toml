add_newline = false

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:#4AA3DF'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#4AA3DF)"
error_symbol = "[пҖҚ пҒӢ](bold fg:#4AA3DF)"

[package]
disabled = true

[git_branch]
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:#4AA3DF)[$symbol $branch(:$remote_branch)](fg:#0B2A3C bg:#4AA3DF)[оӮҙ ](bold fg:#4AA3DF)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:#4AA3DF bold fg:#0B2A3C)[оӮҙ](bold fg:#4AA3DF)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true

[time]
disabled = true

[username]
style_user = "bold bg:#4AA3DF fg:#0B2A3C"
style_root = "red bold"
format = "[оӮ¶](bold fg:#4AA3DF)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#4AA3DF fg:#0B2A3C"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:#4AA3DF)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:#4AA3DF)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#4AA3DF)[у°Әў $duration](bold bg:#4AA3DF fg:#0B2A3C)[оӮҙ](bold fg:#4AA3DF)'